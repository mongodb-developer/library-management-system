<lms-search-bar
  (itemsFound)="updateItems($event)"
  (ragAnswer)="onRagAnswer($event)">
</lms-search-bar>

<!-- RAG ANSWER -->
<div *ngIf="ragResponse" class="rag-answer">
  <h3>Library Assistant</h3>
  <p>{{ ragResponse.answer }}</p>
</div>

<!-- RAG BOOKS -->
<ng-container *ngIf="ragBooks$ as books$">
  <div class="rag-books">
    <h4>Related books</h4>

    <div class="book-card-wrapper">
      <mat-card class="book-card" *ngFor="let book of books$ | async">

        <img
          class="img-link cropped book-thumbnail"
          onerror="this.onerror=null; this.src='http://lgimages.s3.amazonaws.com/gc-md.gif'"
          [routerLink]="['/books', book.isbn]"
          mat-card-image
          [src]="book.cover"
          [alt]="book.title"
        />

        <mat-card-header class="book-card-header">
          <mat-card-title class="book-card-title">
            <h3 class="book-title">
              <a [routerLink]="['/books', book.isbn]">
                {{ book.title }}
              </a>
            </h3>

            <span class="book-authors">
              by
              <span *ngFor="let author of book.authors; let last = last">
                <a [routerLink]="['/authors', author._id]">
                  {{ author.name }}
                </a>
                <span *ngIf="!last">, </span>
              </span>
            </span>
          </mat-card-title>
        </mat-card-header>

        <mat-card-content class="book-card-content">
          <div class="book-details">
            <span class="book-description" *ngIf="book.bookOfTheMonth">
              🏆 Book of the Month selection 🏆
            </span>
          </div>

          <div>
            <p class="book-description" [innerHTML]="book.synopsis"></p>
          </div>
        </mat-card-content>

      </mat-card>
    </div>
  </div>
</ng-container>
